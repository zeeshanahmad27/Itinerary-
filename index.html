<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London 3-Day Travel Plan</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: '#2563eb' }
                }
            }
        }
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <style>
        body { background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modal Transitions */
        .modal-enter { animation: fadeIn 0.3s ease-out forwards; }
        .modal-content-enter { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Map custom route line animation */
        .route-line {
            stroke-dasharray: 10;
            animation: dash 20s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -1000; } }
        
        /* Timeline line styling */
        .timeline-line {
            position: absolute; left: 24px; top: 0; bottom: 0;
            width: 2px; background-color: #e2e8f0; z-index: 0;
        }
        @media (min-width: 768px) {
            .timeline-line { left: 40px; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased relative">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">🇬🇧 London Trip</h1>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Base: Generator Hostel</p>
            </div>
            <div class="flex gap-2">
                <a href="#day-1" class="hidden md:block px-3 py-1.5 text-sm font-medium bg-slate-100 hover:bg-slate-200 rounded-full transition">Day 1</a>
                <a href="#day-2" class="hidden md:block px-3 py-1.5 text-sm font-medium bg-slate-100 hover:bg-slate-200 rounded-full transition">Day 2</a>
                <a href="#day-3" class="hidden md:block px-3 py-1.5 text-sm font-medium bg-slate-100 hover:bg-slate-200 rounded-full transition">Day 3</a>
            </div>
        </div>
    </header>

    <!-- Main Content: Timeline -->
    <main class="max-w-3xl mx-auto px-4 py-8 relative" id="timeline-container">
        <!-- Content injected by JS -->
    </main>

    <!-- Map Modal -->
    <div id="map-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 sm:p-6">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeMap()"></div>
        <div class="bg-white w-full max-w-4xl h-[80vh] rounded-2xl shadow-2xl relative z-10 flex flex-col overflow-hidden modal-content-enter">
            <div class="flex justify-between items-center p-4 border-b border-slate-100">
                <h2 id="map-modal-title" class="font-bold text-lg">Route Map</h2>
                <button onclick="closeMap()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-full transition"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="map" class="w-full flex-1 bg-slate-100"></div>
        </div>
    </div>

    <!-- Gallery Modal -->
    <div id="gallery-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-0 sm:p-6">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="closeGallery()"></div>
        <div class="relative z-10 w-full max-w-5xl flex flex-col items-center justify-center h-full sm:h-auto modal-content-enter">
            <button onclick="closeGallery()" class="absolute top-4 right-4 text-white bg-black/50 hover:bg-black/80 p-2 rounded-full z-20"><i data-lucide="x" class="w-6 h-6"></i></button>
            
            <div class="relative w-full aspect-square sm:aspect-video bg-black/50 sm:rounded-xl overflow-hidden flex items-center justify-center">
                <img id="gallery-main-img" src="" class="max-w-full max-h-full object-contain" alt="Gallery Image">
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // Default fallback image in case Wikipedia has no image
        const FALLBACK_IMG = "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=800&q=80";

        // --- Data Structure with Real Wikipedia Queries ---
        const tripData = [
            {
                day: 1, title: "Bloomsbury, West End & South Flavours", date: "Friday",
                stops: [
                    {
                        id: "d1-1", name: "The British Museum", time: "10:00 AM", hours: "10:00 AM - 5:00 PM",
                        desc: "Start your day with incredible world history just a short walk from your hostel.",
                        lat: 51.5194, lng: -0.1270, requiresBooking: true, bookingUrl: "https://www.britishmuseum.org/visit",
                        wikiQuery: "British_Museum", images: [FALLBACK_IMG],
                        transit: { mode: "Walk", icon: "footprints", time: "15 mins", cost: "Free", route: "Walk down Southampton Row" }
                    },
                    {
                        id: "d1-2", name: "Post-Building Roof Garden", time: "12:30 PM", hours: "10:00 AM - 8:00 PM",
                        desc: "A brilliant hidden gem! A free public roof garden on the 9th floor. Bring physical Photo ID to enter.",
                        lat: 51.5165, lng: -0.1245, requiresBooking: false,
                        wikiQuery: "Holborn", images: [FALLBACK_IMG], // Holborn area image
                        transit: { mode: "Walk", icon: "footprints", time: "5 mins", cost: "Free", route: "Walk west towards St Giles" }
                    },
                    {
                        id: "d1-3", name: "Outernet London", time: "1:30 PM", hours: "10:00 AM - 11:30 PM",
                        desc: "Walk into these massive, immersive digital screen rooms right by Tottenham Court Road.",
                        lat: 51.5150, lng: -0.1300, requiresBooking: false,
                        wikiQuery: "Tottenham_Court_Road", images: [FALLBACK_IMG],
                        transit: { mode: "Walk", icon: "footprints", time: "10 mins", cost: "Free", route: "Walk along Oxford Street" }
                    },
                    {
                        id: "d1-4", name: "Oxford St & Marylebone", time: "2:00 PM", hours: "Shops generally 10am - 8pm",
                        desc: "Window shop Oxford Street, then turn right to Marylebone High Street for a slightly quieter, village feel. Great lunch spot!",
                        lat: 51.5149, lng: -0.1446, requiresBooking: false,
                        wikiQuery: "Oxford_Street", images: [FALLBACK_IMG],
                        transit: { mode: "Tube (Central Line)", icon: "train-track", time: "15 mins", cost: "£2.80", route: "Marble Arch -> Notting Hill Gate" }
                    },
                    {
                        id: "d1-5", name: "Notting Hill", time: "4:00 PM", hours: "Public area",
                        desc: "Wander the colorful streets and famous Portobello Road.",
                        lat: 51.5140, lng: -0.2036, requiresBooking: false,
                        wikiQuery: "Notting_Hill", images: [FALLBACK_IMG],
                        transit: { mode: "Tube (Central & Northern)", icon: "train-track", time: "45 mins", cost: "£2.80", route: "Notting Hill Gate -> Bank -> Tooting Broadway" }
                    },
                    {
                        id: "d1-6", name: "Tooting Market", time: "6:30 PM", hours: "Open until 10:30 PM",
                        desc: "Incredible, buzzing atmosphere. Grab the best South Asian and international street food in London for dinner.",
                        lat: 51.4285, lng: -0.1661, requiresBooking: false,
                        wikiQuery: "Tooting", images: [FALLBACK_IMG],
                        transit: null
                    }
                ]
            },
            {
                day: 2, title: "Museums, Art & The East End", date: "Saturday",
                stops: [
                    {
                        id: "d2-1", name: "Museum Row (NHM / V&A)", time: "9:30 AM", hours: "10:00 AM - 5:45 PM",
                        desc: "Pick 1 or 2 museums to explore inside. The architecture alone is stunning.",
                        lat: 51.4967, lng: -0.1764, requiresBooking: true, bookingUrl: "https://www.nhm.ac.uk/visit.html",
                        wikiQuery: "Natural_History_Museum,_London", images: [FALLBACK_IMG],
                        transit: { mode: "Walk", icon: "footprints", time: "15 mins", cost: "Free", route: "Walk north to the park" }
                    },
                    {
                        id: "d2-2", name: "Hyde Park", time: "1:00 PM", hours: "5:00 AM - 12:00 AM",
                        desc: "A refreshing stroll through London's famous royal park.",
                        lat: 51.5073, lng: -0.1657, requiresBooking: false,
                        wikiQuery: "Hyde_Park,_London", images: [FALLBACK_IMG],
                        transit: { mode: "Walk/Bus", icon: "bus", time: "25 mins", cost: "£1.75", route: "Bus 9 or walk through Green Park" }
                    },
                    {
                        id: "d2-3", name: "The National Gallery", time: "2:30 PM", hours: "10:00 AM - 6:00 PM",
                        desc: "Enjoy some of the world's greatest European art in Trafalgar Square.",
                        lat: 51.5089, lng: -0.1283, requiresBooking: true, bookingUrl: "https://www.nationalgallery.org.uk/visiting",
                        wikiQuery: "National_Gallery,_London", images: [FALLBACK_IMG],
                        transit: { mode: "Walk", icon: "footprints", time: "15 mins", cost: "Free", route: "Walk via Charing Cross Rd" }
                    },
                    {
                        id: "d2-4", name: "The Hunterian Museum", time: "4:00 PM", hours: "10:00 AM - 5:00 PM",
                        desc: "Fascinating (and slightly macabre) museum of anatomy and surgery.",
                        lat: 51.5147, lng: -0.1180, requiresBooking: false,
                        wikiQuery: "Hunterian_Museum_(London)", images: [FALLBACK_IMG],
                        transit: { mode: "Elizabeth Line", icon: "train-track", time: "25 mins", cost: "£2.80", route: "Tottenham Court Rd -> Canary Wharf" }
                    },
                    {
                        id: "d2-5", name: "Canary Wharf", time: "5:30 PM", hours: "Public area",
                        desc: "Walk amongst towering financial skyscrapers and grab dinner by the water.",
                        lat: 51.5054, lng: -0.0235, requiresBooking: false,
                        wikiQuery: "Canary_Wharf", images: [FALLBACK_IMG],
                        transit: { mode: "DLR", icon: "train-track", time: "15 mins", cost: "£1.70", route: "Canary Wharf -> Royal Victoria" }
                    },
                    {
                        id: "d2-6", name: "IFS Cloud Cable Car", time: "7:30 PM", hours: "Closes at 9:00 PM",
                        desc: "Epic sunset ride gliding over the River Thames.",
                        lat: 51.5077, lng: 0.0175, requiresBooking: true, bookingUrl: "https://tfl.gov.uk/modes/ifs-cloud-cable-car/",
                        wikiQuery: "IFS_Cloud_Cable_Car", images: [FALLBACK_IMG],
                        transit: null
                    }
                ]
            },
            {
                day: 3, title: "The Royal Walk & Iconic Southbank", date: "Sunday",
                stops: [
                    {
                        id: "d3-1", name: "Buckingham Palace", time: "10:00 AM", hours: "Changing Guard: 10:45 AM",
                        desc: "Walk down the Mall to see the palace.",
                        lat: 51.5014, lng: -0.1419, requiresBooking: false,
                        wikiQuery: "Buckingham_Palace", images: [FALLBACK_IMG],
                        transit: { mode: "Walk", icon: "footprints", time: "15 mins", cost: "Free", route: "Walk through St James's Park" }
                    },
                    {
                        id: "d3-2", name: "Big Ben & Westminster", time: "11:30 AM", hours: "Public view",
                        desc: "Iconic photo spots around Parliament Square.",
                        lat: 51.5007, lng: -0.1246, requiresBooking: false,
                        wikiQuery: "Big_Ben", images: [FALLBACK_IMG],
                        transit: { mode: "Walk", icon: "footprints", time: "10 mins", cost: "Free", route: "Cross Westminster Bridge" }
                    },
                    {
                        id: "d3-3", name: "The London Eye", time: "12:15 PM", hours: "11:00 AM - 6:00 PM",
                        desc: "Stand right under the massive wheel or take a ride.",
                        lat: 51.5033, lng: -0.1195, requiresBooking: true, bookingUrl: "https://www.londoneye.com/",
                        wikiQuery: "London_Eye", images: [FALLBACK_IMG],
                        transit: { mode: "Walk/Tube", icon: "footprints", time: "25 mins", cost: "Free", route: "Walk Southbank or Jubilee Line to London Bridge" }
                    },
                    {
                        id: "d3-4", name: "Borough Market", time: "1:30 PM", hours: "Sundays: 10:00 AM - 4:00 PM",
                        desc: "The perfect place to grab an incredible Sunday lunch from various food stalls.",
                        lat: 51.5055, lng: -0.0905, requiresBooking: false,
                        wikiQuery: "Borough_Market", images: [FALLBACK_IMG],
                        transit: { mode: "Walk", icon: "footprints", time: "15 mins", cost: "Free", route: "Walk west along the river" }
                    },
                    {
                        id: "d3-5", name: "Tate Modern", time: "3:00 PM", hours: "10:00 AM - 6:00 PM",
                        desc: "Explore contemporary art housed in a massive old power station.",
                        lat: 51.5076, lng: -0.0994, requiresBooking: true, bookingUrl: "https://www.tate.org.uk/visit/tate-modern",
                        wikiQuery: "Tate_Modern", images: [FALLBACK_IMG],
                        transit: { mode: "Walk", icon: "footprints", time: "5 mins", cost: "Free", route: "Cross the Millennium Bridge" }
                    },
                    {
                        id: "d3-6", name: "St. Paul's Cathedral", time: "4:30 PM", hours: "Sundays: Worship Only",
                        desc: "Tourist access inside is restricted on Sundays, but the outside view from the bridge is the best part!",
                        lat: 51.5138, lng: -0.0984, requiresBooking: false,
                        wikiQuery: "St_Paul's_Cathedral", images: [FALLBACK_IMG],
                        transit: { mode: "Walk/Bus", icon: "bus", time: "25 mins", cost: "Free/£1.75", route: "Walk east along Queen Victoria St" }
                    },
                    {
                        id: "d3-7", name: "Tower Bridge", time: "5:30 PM", hours: "Public view / Exhibit 9:30 AM - 6:00 PM",
                        desc: "End your trip at the spectacular Tower Bridge.",
                        lat: 51.5055, lng: -0.0754, requiresBooking: true, bookingUrl: "https://www.towerbridge.org.uk/",
                        wikiQuery: "Tower_Bridge", images: [FALLBACK_IMG],
                        transit: null
                    }
                ]
            }
        ];

        // --- Render Application ---
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('timeline-container');
            
            const line = document.createElement('div');
            line.className = 'timeline-line';
            container.appendChild(line);

            tripData.forEach((dayInfo) => {
                const dayHtml = `
                    <div class="relative z-10 mb-8 pt-8" id="day-${dayInfo.day}">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 ml-12 md:ml-20">
                            <div>
                                <span class="inline-block px-3 py-1 bg-brand text-white text-xs font-bold rounded-full mb-2 uppercase tracking-wide">Day ${dayInfo.day} • ${dayInfo.date}</span>
                                <h2 class="text-2xl font-extrabold text-slate-800">${dayInfo.title}</h2>
                            </div>
                            <button onclick="openMap(${dayInfo.day})" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-white border border-slate-200 hover:border-brand hover:text-brand rounded-xl font-semibold shadow-sm transition text-sm shrink-0">
                                <i data-lucide="map" class="w-4 h-4"></i> View Route Map
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', dayHtml);

                dayInfo.stops.forEach((stop, index) => {
                    const bookingBtn = stop.requiresBooking 
                        ? `<a href="${stop.bookingUrl}" target="_blank" class="mt-4 w-full sm:w-auto inline-flex items-center justify-center gap-2 px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white rounded-lg text-sm font-semibold transition"><i data-lucide="ticket" class="w-4 h-4"></i> Book Tickets</a>` 
                        : '';

                    const stopHtml = `
                        <div class="relative z-10 mb-2 flex items-start group">
                            <div class="absolute left-6 md:left-10 w-4 h-4 bg-white border-[3px] border-brand rounded-full mt-6 -translate-x-1/2 z-20 group-hover:scale-125 group-hover:bg-brand transition-all"></div>
                            
                            <div class="ml-12 md:ml-20 w-full bg-white rounded-2xl shadow-sm border border-slate-100 p-4 sm:p-5 hover:shadow-md transition">
                                <div class="flex flex-col sm:flex-row gap-5">
                                    <!-- Image Thumbnail with Loading State -->
                                    <div class="w-full sm:w-1/3 aspect-[4/3] sm:aspect-square relative rounded-xl overflow-hidden cursor-pointer group/img" onclick="openGallery('${stop.id}')">
                                        <div id="loader-${stop.id}" class="absolute inset-0 bg-slate-200 animate-pulse z-10"></div>
                                        <img id="img-${stop.id}" src="${stop.images[0]}" class="w-full h-full object-cover group-hover/img:scale-110 transition duration-500 z-0 opacity-0" alt="${stop.name}" onload="this.classList.remove('opacity-0'); document.getElementById('loader-${stop.id}')?.remove();">
                                        <div class="absolute inset-0 bg-black/20 group-hover/img:bg-black/0 transition flex items-center justify-center">
                                            <i data-lucide="expand" class="w-6 h-6 text-white opacity-0 group-hover/img:opacity-100 drop-shadow-md"></i>
                                        </div>
                                    </div>
                                    
                                    <div class="w-full sm:w-2/3 flex flex-col justify-center">
                                        <div class="flex items-center gap-2 mb-2">
                                            <span class="text-brand font-bold text-sm bg-blue-50 px-2 py-0.5 rounded">${stop.time}</span>
                                            <span class="text-slate-400 text-xs font-medium flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> ${stop.hours}</span>
                                        </div>
                                        <h3 class="text-xl font-bold text-slate-800 mb-2">${stop.name}</h3>
                                        <p class="text-slate-600 text-sm leading-relaxed">${stop.desc}</p>
                                        ${bookingBtn}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', stopHtml);

                    if (stop.transit) {
                        const transitHtml = `
                            <div class="relative z-10 mb-2 ml-12 md:ml-20 py-3 flex items-center gap-4 text-slate-500 text-sm">
                                <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200 text-slate-600 shrink-0">
                                    <i data-lucide="${stop.transit.icon}" class="w-4 h-4"></i>
                                </div>
                                <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3 bg-slate-50 px-4 py-2 rounded-lg border border-slate-100 w-full">
                                    <span class="font-semibold text-slate-700">${stop.transit.mode}</span>
                                    <span class="hidden sm:inline text-slate-300">•</span>
                                    <span><i data-lucide="timer" class="w-3 h-3 inline"></i> ${stop.transit.time}</span>
                                    <span class="hidden sm:inline text-slate-300">•</span>
                                    <span class="text-emerald-600 font-medium"><i data-lucide="banknote" class="w-3 h-3 inline"></i> ${stop.transit.cost}</span>
                                    <span class="text-xs text-slate-400 sm:ml-auto w-full sm:w-auto mt-1 sm:mt-0">${stop.transit.route}</span>
                                </div>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', transitHtml);
                    }
                });
            });

            lucide.createIcons();
            
            // --- Fetch Real Images from Wikipedia API ---
            fetchRealImages();
        });

        // This function guarantees 100% real images by asking Wikipedia for them directly
        function fetchRealImages() {
            tripData.forEach(day => {
                day.stops.forEach(stop => {
                    if(stop.wikiQuery) {
                        fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${stop.wikiQuery}`)
                            .then(res => res.json())
                            .then(data => {
                                if(data.thumbnail && data.thumbnail.source) {
                                    // Make the image high quality (800px instead of default thumbnail)
                                    const realImageUrl = data.thumbnail.source.replace(/\/\d+px-/, '/800px-');
                                    
                                    // Update the image source on the page
                                    document.getElementById(`img-${stop.id}`).src = realImageUrl;
                                    
                                    // Update the internal array so the Gallery Modal uses the real image
                                    stop.images = [realImageUrl];
                                }
                            })
                            .catch(e => console.log("Used fallback for", stop.name));
                    }
                });
            });
        }

        // --- Map Logic ---
        let mapInstance = null;
        let mapRouteLayer = null;

        function openMap(dayNum) {
            const dayData = tripData.find(d => d.day === dayNum);
            document.getElementById('map-modal-title').innerText = `Day ${dayNum} Route: ${dayData.title}`;
            document.getElementById('map-modal').classList.remove('hidden');
            
            setTimeout(() => {
                if (!mapInstance) {
                    mapInstance = L.map('map').setView([51.505, -0.12], 12);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap', subdomains: 'abcd', maxZoom: 19
                    }).addTo(mapInstance);
                }
                
                mapInstance.invalidateSize();
                if (mapRouteLayer) { mapInstance.removeLayer(mapRouteLayer); }
                mapRouteLayer = L.layerGroup().addTo(mapInstance);

                const latlngs = [];
                const baseLatlng = [51.5262, -0.1256];
                latlngs.push(baseLatlng);
                L.marker(baseLatlng, {
                    icon: L.divIcon({ className: 'bg-purple-600 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold border-2 border-white shadow-md', html: '🏠', iconSize: [32, 32], iconAnchor: [16,16] })
                }).bindPopup('<b>Start: Generator Hostel</b>').addTo(mapRouteLayer);

                dayData.stops.forEach((stop, idx) => {
                    latlngs.push([stop.lat, stop.lng]);
                    const icon = L.divIcon({
                        className: 'bg-brand text-white rounded-full w-8 h-8 flex items-center justify-center font-bold border-2 border-white shadow-md',
                        html: `${idx + 1}`,
                        iconSize: [32, 32],
                        iconAnchor: [16, 16]
                    });
                    L.marker([stop.lat, stop.lng], {icon}).bindPopup(`<b>${stop.time}</b><br>${stop.name}`).addTo(mapRouteLayer);
                });

                L.polyline(latlngs, {
                    color: '#2563eb', weight: 4, opacity: 0.8, className: 'route-line'
                }).addTo(mapRouteLayer);

                mapInstance.fitBounds(L.latLngBounds(latlngs), { padding: [50, 50] });
            }, 300);
        }

        function closeMap() { document.getElementById('map-modal').classList.add('hidden'); }

        // --- Gallery Logic ---
        function openGallery(stopId) {
            // Find the correct stop data to get the currently loaded image
            let currentStop = null;
            tripData.forEach(day => day.stops.forEach(stop => { if(stop.id === stopId) currentStop = stop; }));
            
            if(currentStop && currentStop.images) {
                document.getElementById('gallery-main-img').src = currentStop.images[0];
                document.getElementById('gallery-modal').classList.remove('hidden');
            }
        }

        function closeGallery() { document.getElementById('gallery-modal').classList.add('hidden'); }
    </script>
</body>
</html>
