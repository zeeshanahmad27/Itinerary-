                latlngs.push(baseLatlng);
                L.marker(baseLatlng, {
                    icon: L.divIcon({ className: 'bg-purple-600 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold border-2 border-white shadow-md', html: '🏠', iconSize: [32, 32], iconAnchor: [16,16] })
                }).bindPopup('<b>Start: Generator Hostel</b>').addTo(mapRouteLayer);

                // Add Stops
                dayData.stops.forEach((stop, idx) => {
                    latlngs.push([stop.lat, stop.lng]);
                    const icon = L.divIcon({
                        className: 'bg-brand text-white rounded-full w-8 h-8 flex items-center justify-center font-bold border-2 border-white shadow-md',
                        html: `${idx + 1}`,
                        iconSize: [32, 32],
                        iconAnchor: [16, 16]
                    });
                    L.marker([stop.lat, stop.lng], {icon}).bindPopup(`<b>${stop.time}</b><br>${stop.name}`).addTo(mapRouteLayer);
                });

                // Draw connecting line
                L.polyline(latlngs, {
                    color: '#2563eb', weight: 4, opacity: 0.8, className: 'route-line'
                }).addTo(mapRouteLayer);

                // Fit bounds
                mapInstance.fitBounds(L.latLngBounds(latlngs), { padding: [50, 50] });

            }, 50);
        }

        function closeMap() {
            document.getElementById('map-modal').classList.add('hidden');
        }

        // --- Gallery Logic ---
        let currentGalleryImages = [];
        let currentGalleryIndex = 0;

        function openGallery(imageArray) {
            currentGalleryImages = imageArray;
            currentGalleryIndex = 0;
            updateGalleryUI();
            document.getElementById('gallery-modal').classList.remove('hidden');
        }

        function closeGallery() {
            document.getElementById('gallery-modal').classList.add('hidden');
        }

        function nextImage() {
            currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryImages.length;
            updateGalleryUI();
        }

        function prevImage() {
            currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length;
            updateGalleryUI();
        }

        function setGalleryImage(index) {
            currentGalleryIndex = index;
            updateGalleryUI();
        }

        function updateGalleryUI() {
            // Main Image
            document.getElementById('gallery-main-img').src = currentGalleryImages[currentGalleryIndex];
            
            // Thumbnails
            const thumbContainer = document.getElementById('gallery-thumbnails');
            thumbContainer.innerHTML = '';
            
            if(currentGalleryImages.length > 1) {
                currentGalleryImages.forEach((img, idx) => {
                    const opacity = idx === currentGalleryIndex ? 'opacity-100 border-2 border-brand' : 'opacity-50 border-2 border-transparent hover:opacity-100';
                    const thumb = `<img src="${img}" onclick="setGalleryImage(${idx})" class="h-16 w-16 sm:h-20 sm:w-20 object-cover rounded cursor-pointer transition ${opacity}">`;
                    thumbContainer.insertAdjacentHTML('beforeend', thumb);
                });
            }
        }
    </script>
</body>
</html>
